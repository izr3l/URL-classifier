name: Retrain Phishing Model

on:
  schedule:
    - cron: '0 0 1 * *' # Run on the 1st of every month
  workflow_dispatch: # Allow manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd training
          pip install -r requirements.txt

      - name: Pull latest data
        run: |
          cd training
          python pull_data.py
        
      - name: Train model and export ONNX
        run: |
          cd training
          python train.py
          python export_onnx.py

      - name: Commit and push updated model
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add extension/model/phishing-classifier.onnx
          git add artifacts/
          git commit -m "chore(model): Automated monthly model retraining" || exit 0
          git push
